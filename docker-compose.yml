services:
  # Frontend Service
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: dashboard_khp_frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:3001/api/v1
    networks:
      - dashboard_network
    depends_on:
      - backend

  # Backend Service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dashboard_khp_backend
    ports:
      - "3001:3001"
    volumes:
      - ./backend:/app
      - /app/node_modules
    environment:
      - PORT=3001
      - DATABASE_URL=postgres://khp_user:dashboard_password_secure@postgres:5432/dashboard_khp_db
      - REDIS_URL=redis://redis:6379
      - NODE_ENV=development
    networks:
      - dashboard_network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: dashboard_khp_postgres
    environment:
      POSTGRES_DB: dashboard_khp_db
      POSTGRES_USER: khp_user
      POSTGRES_PASSWORD: dashboard_password_secure
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dashboard_user -d dashboard_khp_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dashboard_network

  # Redis (for Bull job queue)
  redis:
    image: redis:7-alpine
    container_name: dashboard_khp_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dashboard_network

  # pgAdmin (Database Management UI - optional)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: dashboard_khp_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: khp@junkhp.com
      PGADMIN_DEFAULT_PASSWORD: khp_pgadmin
      SCRIPT_NAME: /pgadmin
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - dashboard_network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  dashboard_network:
    driver: bridge
